services:
  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Endpoint API ─────────────────────────────────────────────────────────────
  endpoint_api:
    build:
      context: ./endpoint_api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: guest
      AMQP_PASSWORD: guest
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_ITINERARY_REQUEST_ROUTING_KEY: itinerary:user_request
    depends_on:
      rabbitmq:
        condition: service_healthy

