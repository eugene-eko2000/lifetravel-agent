services:
  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Endpoint API ─────────────────────────────────────────────────────────────
  endpoint_api:
    build:
      context: ./endpoint_api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_ITINERARY_REQUEST_ROUTING_KEY: itinerary:user_request
      RABBITMQ_MISSING_INFO_ROUTING_KEY: itinerary:missing_info
      RABBITMQ_MISSING_INFO_QUEUE: endpoint_api_missing_info_queue
      RABBITMQ_RANKED_ROUTING_KEY: itinerary:ranked
      RABBITMQ_RANKED_QUEUE: endpoint_api_ranked_queue
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_DEBUG_QUEUE: endpoint_api_debug_queue
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_STATUS_QUEUE: endpoint_api_status_queue
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Query Router ─────────────────────────────────────────────────────────────
  query_router:
    build:
      context: ./query_router
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:user_request
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:query_router_response
      RABBITMQ_MISSING_INFO_ROUTING_KEY: itinerary:missing_info
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: query_router_itinerary_user_request_queue
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-5.2
      OPENAI_BASE_URL: https://api.openai.com/v1
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Inventory Flight Service ────────────────────────────────────────────────
  inventory_flight_service:
    build:
      context: ./inventory_flight_service
    ports:
      - "8082:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:query_router_response
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:provider_flight_response
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: inventory_flight_service_structured_request_queue
      AMADEUS_FLIGHTS_OFFERS_URL: https://test.api.amadeus.com/v2/shopping/flight-offers
      AMADEUS_TOKEN_URL: https://test.api.amadeus.com/v1/security/oauth2/token
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_FLIGHTS_QPS_LIMIT: 1
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Inventory Hotel Service ─────────────────────────────────────────────────
  inventory_hotel_service:
    build:
      context: ./inventory_hotel_service
    ports:
      - "8084:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:provider_flight_response
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:provider_response
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: inventory_hotel_service_provider_flight_response_queue
      AMADEUS_HOTELS_LIST_URL: https://test.api.amadeus.com/v1/reference-data/locations/hotels/by-city
      AMADEUS_HOTELS_LIST_BY_GEOCODE_URL: https://test.api.amadeus.com/v1/reference-data/locations/hotels/by-geocode
      AMADEUS_HOTELS_OFFERS_URL: https://test.api.amadeus.com/v3/shopping/hotel-offers
      AMADEUS_TOKEN_URL: https://test.api.amadeus.com/v1/security/oauth2/token
      AMADEUS_HOTELS_OFFERS_LIMIT: 10
      AMADEUS_HOTELS_CITYCODE_RADIUS_KM: 15
      AMADEUS_HOTELS_LATLNG_RADIUS_KM: 5
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_HOTELS_QPS_LIMIT: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory_flight_service:
        condition: service_started

  # ── Ranking Service ──────────────────────────────────────────────────────────
  ranking_service:
    build:
      context: ./ranking_service
    ports:
      - "8083:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:provider_response
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:ranked
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: ranking_service_provider_response_queue
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Itinerary Verifier Service ──────────────────────────────────────────────
  itinerary_verifier:
    build:
      context: ./itinerary_verifier
    ports:
      - "8085:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:provider_response
      RABBITMQ_PUBLISH_VERIFIED_MESSAGE_ROUTING_KEY: itinerary:verified_response
      RABBITMQ_PUBLISH_ADJUSTED_REQUEST_ROUTING_KEY: itinerary:user_request
      RABBITMQ_QUEUE_NAME: itinerary_verifier_provider_response_queue
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-5.2
      OPENAI_BASE_URL: https://api.openai.com/v1
    depends_on:
      rabbitmq:
        condition: service_healthy

