services:
  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:latest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Endpoint API ─────────────────────────────────────────────────────────────
  endpoint_api:
    build:
      context: ./endpoint_api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_ITINERARY_REQUEST_ROUTING_KEY: itinerary:user_request
      RABBITMQ_MISSING_INFO_ROUTING_KEY: itinerary:missing_info
      RABBITMQ_MISSING_INFO_QUEUE: endpoint_api_missing_info_queue
      RABBITMQ_RANKED_ROUTING_KEY: itinerary:ranked
      RABBITMQ_RANKED_QUEUE: endpoint_api_ranked_queue
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_DEBUG_QUEUE: endpoint_api_debug_queue
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_STATUS_QUEUE: endpoint_api_status_queue
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Query Router ─────────────────────────────────────────────────────────────
  query_router:
    build:
      context: ./query_router
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:user_request
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:structured_request
      RABBITMQ_MISSING_INFO_ROUTING_KEY: itinerary:missing_info
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: query_router_itinerary_user_request_queue
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-5.2
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Inventory Flight Service ────────────────────────────────────────────────
  inventory_flight_service:
    build:
      context: ./inventory_flight_service
    ports:
      - "8082:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:structured_request
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:provider_flight_response
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: inventory_flight_service_structured_request_queue
      AMADEUS_FLIGHTS_OFFERS_URL: ${AMADEUS_FLIGHTS_OFFERS_URL}
      AMADEUS_TOKEN_URL: ${AMADEUS_TOKEN_URL}
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_INTERVAL_BETWEEN_QUERIES: 0.1
      AMADEUS_429_MAX_ATTEMPTS: 1
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Inventory Hotel Service ─────────────────────────────────────────────────
  inventory_hotel_service:
    build:
      context: ./inventory_hotel_service
    ports:
      - "8084:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:provider_flight_response
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:provider_response
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: inventory_hotel_service_provider_flight_response_queue
      AMADEUS_HOTELS_LIST_URL: ${AMADEUS_HOTELS_LIST_URL}
      AMADEUS_HOTELS_LIST_BY_GEOCODE_URL: ${AMADEUS_HOTELS_LIST_BY_GEOCODE_URL}
      AMADEUS_HOTELS_OFFERS_URL: ${AMADEUS_HOTELS_OFFERS_URL}
      AMADEUS_TOKEN_URL: ${AMADEUS_TOKEN_URL}
      AMADEUS_INTERVAL_BETWEEN_QUERIES: 0.1
      AMADEUS_HOTELS_OFFERS_LIMIT: 10
      AMADEUS_MAX_HOTEL_OFFERS: 10
      AMADEUS_HOTELS_CITYCODE_RADIUS_KM: 15
      AMADEUS_HOTELS_LATLNG_RADIUS_KM: 5
      AMADEUS_CLIENT_ID: ${AMADEUS_CLIENT_ID:-}
      AMADEUS_CLIENT_SECRET: ${AMADEUS_CLIENT_SECRET:-}
      AMADEUS_429_MAX_ATTEMPTS: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory_flight_service:
        condition: service_started

  # ── Itinerary Composer ──────────────────────────────────────────────────────
  itinerary_composer:
    build:
      context: ./itinerary_composer
    ports:
      - "8085:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:provider_response
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:composed
      RABBITMQ_DEBUG_ROUTING_KEY: debug:message
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: itinerary_composer_provider_response_queue
      EXCHANGE_RATE_APP_ID: ${EXCHANGE_RATE_APP_ID:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory_hotel_service:
        condition: service_started

  # ── Ranking Service ──────────────────────────────────────────────────────────
  ranking_service:
    build:
      context: ./ranking_service
    ports:
      - "8083:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: ${AMQP_USER:-guest}
      AMQP_PASSWORD: ${AMQP_PASSWORD:-guest}
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:composed
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:ranked
      RABBITMQ_STATUS_ROUTING_KEY: status:message
      RABBITMQ_QUEUE_NAME: ranking_service_composed_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
      itinerary_composer:
        condition: service_started
