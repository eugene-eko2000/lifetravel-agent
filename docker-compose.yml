services:
  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Endpoint API ─────────────────────────────────────────────────────────────
  endpoint_api:
    build:
      context: ./endpoint_api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: guest
      AMQP_PASSWORD: guest
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_ITINERARY_REQUEST_ROUTING_KEY: itinerary:user_request
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── Query Router ─────────────────────────────────────────────────────────────
  query_router:
    build:
      context: ./query_router
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_PORT: 5672
      AMQP_USER: guest
      AMQP_PASSWORD: guest
      RABBITMQ_EXCHANGE: lifetravel_agent
      RABBITMQ_SUBSCRIBE_ROUTING_KEY: itinerary:user_request
      RABBITMQ_PUBLISH_ROUTING_KEY: itinerary:query_router_response
      RABBITMQ_MISSING_INFO_ROUTING_KEY: itinerary:missing_info
      RABBITMQ_QUEUE_NAME: query_router_itinerary_user_request_queue
    depends_on:
      rabbitmq:
        condition: service_healthy

