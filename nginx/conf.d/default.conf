# TLS material: mount PEM files at /etc/nginx/ssl/ (see docker-compose volumes).
# Dev self-signed example:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/ssl/lifetravel_ai.key -out nginx/ssl/lifetravel_ai_chain.crt \
#     -subj "/CN=localhost"

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream endpoint_api {
    server endpoint_api:8080;
}

server {
    listen 80 default_server;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/lifetravel_ai_chain.crt;
    ssl_certificate_key /etc/nginx/ssl/lifetravel_ai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    location / {
        proxy_pass http://endpoint_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
